<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Sullydux's Project</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-strong: rgba(30, 41, 59, 0.92);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent-strong: #f97316;
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 20px 45px rgba(2, 8, 23, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.28), transparent 34%),
        linear-gradient(160deg, #020617 0%, #0f172a 46%, #1e293b 100%);
      display: flex;
      flex-direction: column;
    }

    header,
    footer {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      padding: 2.5rem 0 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0.8rem 0 0;
      max-width: 60ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    main {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 0 0 3rem;
      flex: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
    }

    .panel h2 {
      margin: 0 0 0.4rem;
      font-size: 1.4rem;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-list {
      margin-top: 1.5rem;
      display: grid;
      gap: 1rem;
    }

    .copy-card {
      color: inherit;
      text-decoration: none;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 1rem;
      align-items: center;
      background: var(--panel-strong);
      border: 1px solid rgba(245, 158, 11, 0.22);
      border-radius: 22px;
      padding: 1rem;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .copy-card:hover {
      transform: translateY(-2px);
      border-color: rgba(249, 115, 22, 0.7);
      background: rgba(30, 41, 59, 0.98);
    }

    .copy-card:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.35);
      outline-offset: 4px;
    }

    .icon-wrap {
      width: 88px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .details {
      min-width: 0;
    }

    .details h3 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 1.9rem);
      line-height: 1.2;
    }

    .version {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      padding: 0 0 2rem;
      text-align: center;
    }

    footer p {
      margin: 0;
    }

    footer a {
      color: #7dd3fc;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .copy-card {
        grid-template-columns: 72px 1fr;
      }

      .icon-wrap {
        width: 72px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sullydux's Project</h1>
  </header>

  <main>
    <section class="panel">
      <div class="card-list" id="cardList"></div>
    </section>
  </main>

  <footer>
    <p>
      Find me on
      <a href="https://github.com/sullydux" target="_blank" rel="noreferrer">Github</a>
      and
      <a href="https://scratch.mit.edu/users/sullydux/" target="_blank" rel="noreferrer">Scratch</a>.
    </p>
  </footer>

  <script>
    const projects = [
      {
        icon: "Github/Curse-of-the-Forasken-Isle/Icon.png",
        alt: "Forsaken Legends: Cursed Isle icon",
        name: "Forsaken Legends: Cursed Isle",
        version: "Version: 2.18.59 | Computer, PC, and Controller",
        link: "Curse/"
      },
      {
        icon: "Github/Secret-Warfare/icon.png",
        alt: "Secret Warfare icon",
        name: "Secret Warfare",
        version: "Mobile, Tablet, Computer, and PC",
        link: "Secret-Warfare/"
      }
    ];

    const cardList = document.getElementById("cardList");

    cardList.innerHTML = projects.map((project) => `
      <a class="copy-card" href="${project.link}" target="_blank" rel="noreferrer">
        <div class="icon-wrap">
          <img src="${project.icon}" alt="${project.alt}">
        </div>
        <div class="details">
          <h3>${project.name}</h3>
          <div class="version">${project.version}</div>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
