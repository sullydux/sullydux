<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7VS3WRTYBB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7VS3WRTYBB');
  </script>

  <title>Fun Puzzle Games</title>
  <meta property="og:title" content="Fun Puzzle Games">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta property="og:image" content="https://sullydux.github.io/sullydux/Puzzles/favicon.ico">

  <meta name="description" content="Puzzle games I have made.">
  <meta property="og:description" content="Puzzle games I have made.">
  <meta name="author" content="Sullydux">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://sullydux.github.io/sullydux/Puzzle/">
  <meta property="og:type" content="website">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-1: #060708;
      --bg-2: #0f1218;
      --panel: rgba(15, 18, 24, 0.88);
      --line: #262b35;
      --text: #e9ecf1;
      --muted: #9fa8bb;
      --link: #75b7ff;
      --link-hover: #a5d1ff;
      --accent-1: #2d7fff;
      --accent-2: #49b0ff;
      --title-icon-size: 4rem;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, #1c2433 0%, transparent 45%),
        radial-gradient(circle at 80% 100%, #1a1b2c 0%, transparent 40%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
    }

    body {
      min-height: 100svh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
    }

    a:focus-visible,
    .download-btn:focus-visible {
      outline: 2px solid #b8d8ff;
      outline-offset: 2px;
      border-radius: 8px;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      padding: 10px 12px;
      box-sizing: border-box;
    }

    .title-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-icon {
      width: var(--title-icon-size);
      height: var(--title-icon-size);
      flex: 0 0 auto;
      image-rendering: pixelated;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.25vw, 3.5rem);
      letter-spacing: 0.03em;
      font-family: "Eagle Lake", "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      font-weight: 400;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .game-wrap {
      min-height: 0;
      background: #07090e;
      border-top: 1px solid #10141c;
      border-bottom: 1px solid #10141c;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 8px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .footer-line {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.35;
      color: var(--muted);
      max-width: 1200px;
    }

    .download-btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 8px 20px rgba(12, 18, 36, 0.45);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .download-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (max-width: 900px) {
      .footer-line {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 640px) {
      header {
        padding-top: 9px;
      }

      .footer-line {
        font-size: 0.8rem;
      }

      footer {
        gap: 7px;
        padding-top: 9px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <span class="title-brand">
        <img class="title-icon" src="favicon.ico" alt=" ">
        <h1>Fun Puzzle Games</h1>
      </span>
    </header>

    <section class="game-wrap" aria-label="Game container">
      <iframe
        class="game-frame"
        src="game.html"
        title="Fun Puzzle Games iframe"
        scrolling="yes"
        allowfullscreen
        sandbox="allow-forms allow-scripts allow-same-origin allow-pointer-lock allow-popups"
      >
        Your browser does not support embedded content. You can open
        <a href="game.html">the game</a> directly without the webpage.
      </iframe>
    </section>

    <footer>
      <div class="footer-line">
        <a href="https://scratch.mit.edu/projects/1322319904/" target="_blank" rel="noopener">Play this project on Scratch</a>
        |
        <a href="https://sullydux.github.io/sullydux/" target="_blank" rel="noopener">My other projects</a>
        |
        Puzzles do not save when reopen tab
        |
        Puzzle are not of my design I just coded them
      </div>
      <div class="footer-line actions">
        <a class="download-btn" href="game.zip" download="game.zip">Download Game</a>
      </div>
    </footer>
  </main>
</body>
</html>
