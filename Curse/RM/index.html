<html lang="en">
<head>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
      background: #0f1115;
      color: #e6e6e6;
    }

    main {
      max-width: 900px;
      margin: auto;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      margin-top: 2rem;
    }

    h1 {
      font-size: 2.4rem;
      border-bottom: 2px solid #333;
      padding-bottom: 0.3rem;
    }

    p {
      line-height: 1.7;
      margin: 1rem 0;
    }

    strong {
      font-weight: 700;
    }

    em {
      font-style: italic;
    }

    a {
      color: #6ab0ff;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: #1c1f26;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    pre code {
      display: block;
      padding: 1rem;
      overflow-x: auto;
    }

    blockquote {
      border-left: 4px solid #444;
      padding-left: 1rem;
      color: #bdbdbd;
      margin: 1.5rem 0;
    }

    ul, ol {
      padding-left: 2rem;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 2rem 0;
    }

    img {
      max-width: 75%;
      height: auto;
      display: block;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <main id="content">Loading markdown…</main>

<script>
  const MARKDOWN_FILE = "readme.md";

  const renderer = new marked.Renderer();

  renderer.heading = function (token) {
    const raw = token.text;

    // Match optional {#id}
    const match = raw.match(/^(.*?)(?:\s*\{#([\w\-]+)\})?$/);
    const cleanText = match[1];
    const id = match[2] || cleanText
      .toLowerCase()
      .replace(/[^\w]+/g, "-")
      .replace(/^-|-$/g, "");

    return `<h${token.depth} id="${id}">${cleanText}</h${token.depth}>`;
  };

  fetch(MARKDOWN_FILE)
    .then(res => {
      if (!res.ok) throw new Error("Failed to load markdown");
      return res.text();
    })
    .then(md => {
      const content = document.getElementById("content");
      content.innerHTML = marked.parse(md, { renderer });

      /* 🔹 NEW PART: fix hash jump on first load */
      const hash = decodeURIComponent(window.location.hash.slice(1));
      if (hash) {
        const target = document.getElementById(hash);
        if (target) {
          target.scrollIntoView({ behavior: "smooth" });
        }
      }
    })
    .catch(err => {
      document.getElementById("content").innerHTML =
        `<p style="color:#ff6b6b">${err.message}</p>`;
    });

  /* 🔹 Optional but recommended: handle future hash changes */
  window.addEventListener("hashchange", () => {
    const hash = decodeURIComponent(location.hash.slice(1));
    const target = document.getElementById(hash);
    if (target) {
      target.scrollIntoView({ behavior: "smooth" });
    }
  });
</script>
</body>
</html>
